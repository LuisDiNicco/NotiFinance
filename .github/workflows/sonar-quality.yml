name: Sonar Quality

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'sonar-project.properties'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/sonar-quality.yml'
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage for sonar
        run: npm run test:unit:cov && npm run test:e2e:cov

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
