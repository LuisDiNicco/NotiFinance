name: Sonar Quality

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'sonar-project.properties'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/sonar-quality.yml'
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sonar-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage for sonar
        run: npm run test:unit:cov && npm run test:e2e:cov

      - name: Validate Sonar secrets
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "SONAR_TOKEN and SONAR_HOST_URL are required for this workflow"
            exit 1
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
