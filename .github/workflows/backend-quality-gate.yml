name: Backend Quality Gate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'eslint.config.mjs'
      - '.github/workflows/backend-quality-gate.yml'
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend CI gate
        run: npm run verify:backend:ci

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit
          retention-days: 7
          if-no-files-found: warn

      - name: Upload e2e coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage/e2e
          retention-days: 7
          if-no-files-found: warn
